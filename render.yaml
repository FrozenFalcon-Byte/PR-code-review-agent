services:
  - type: web
    name: pr-review-agent-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.server:app --host 0.0.0.0 --port $PORT
    rootDir: .
    envVars:
      - key: MODEL_PROVIDER
        value: gemini
      - key: GOOGLE_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
